services:
  postgres:
    image: postgres:15
    container_name: privacydots-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto
    container_name: privacydots-mosquitto
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy
    container_name: privacydots-ntfy
    volumes:
      - ntfy_data:/var/lib/ntfy
    ports:
      - "8080:80"
    restart: unless-stopped
    command: serve

  django:
    build: ./django
    container_name: privacydots-django
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started

  react:
    build: ./react
    container_name: privacydots-react
    env_file: .env
    restart: unless-stopped
    depends_on:
      - django

  nginx:
    image: nginx:alpine
    container_name: privacydots-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - react
      - django

volumes:
  postgres_data:
  ntfy_data: